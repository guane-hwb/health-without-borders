name: Deploy Cloud Run (WIF)

on:
  workflow_dispatch:
  push:
    branches:
      - develop

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Authorize Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build image
        run: |
          docker build \
            -t "${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPO }}/hwb-backend:${{ github.sha }}" \
            .

      - name: Push image
        run: |
          docker push \
            "${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPO }}/hwb-backend:${{ github.sha }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image "${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPO }}/hwb-backend:${{ github.sha }}" \
            --region "${{ vars.GCP_REGION }}" \
            --service-account "${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}" \
            --set-env-vars "INSTANCE_CONNECTION_NAME=${{ vars.INSTANCE_CONNECTION_NAME }}" \
            --set-env-vars "DB_USER=${{ vars.DB_USER }}" \
            --set-env-vars "DB_NAME=${{ vars.DB_NAME }}" \
            --set-env-vars "GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}" \
            --set-env-vars "GCP_LOCATION=${{ vars.GCP_REGION }}" \
            --set-env-vars "GCP_DATASET_ID=${{ vars.GCP_DATASET_ID }}" \
            --set-env-vars "GCP_HL7_STORE_ID=${{ vars.GCP_HL7_STORE_ID }}" \
            --set-env-vars "HL7_SENDING_APP=${{ vars.HL7_SENDING_APP }}" \
            --set-env-vars "HL7_SENDING_FACILITY=${{ vars.HL7_SENDING_FACILITY }}" \
            --set-env-vars "HL7_RECEIVING_APP=${{ vars.HL7_RECEIVING_APP }}" \
            --set-env-vars "HL7_RECEIVING_FACILITY=${{ vars.HL7_RECEIVING_FACILITY }}" \
            --set-env-vars "HL7_PROCESSING_ID=${{ vars.HL7_PROCESSING_ID }}" \
            --set-env-vars "HL7_VERSION_ID=${{ vars.HL7_VERSION_ID }}" \
            --set-env-vars "ACCESS_TOKEN_EXPIRE_MINUTES=${{ vars.ACCESS_TOKEN_EXPIRE_MINUTES }}" \
            --set-env-vars "BACKEND_CORS_ORIGINS=${{ vars.BACKEND_CORS_ORIGINS }}" \
            --set-env-vars "RATE_LIMIT_LOGIN=${{ vars.RATE_LIMIT_LOGIN }}" \
            --set-env-vars "RATE_LIMIT_PATIENT_SEARCH=${{ vars.RATE_LIMIT_PATIENT_SEARCH }}" \
            --update-secrets "DB_PASS=hwb-db-pass:latest,SECRET_KEY=hwb-secret-key:latest" \
            --allow-unauthenticated
