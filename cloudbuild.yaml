steps:
  # 1. Fase de Integración Continua (CI): Correr Pruebas Automáticas
  - name: 'python:3.11-slim'
    id: 'Run Tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install uv
        uv sync --frozen
        uv run pytest

  # 2. Fase de Construcción (Build): Crear la imagen Docker
  # Nota: Usamos $SHORT_SHA (el código del commit de git) como etiqueta inmutable
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Docker Image'
    args: 
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/hwb-repo/backend:$SHORT_SHA'
      - '.'

  # 3. Fase de Almacenamiento (Push): Subir la imagen a Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Docker Image'
    args: 
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/hwb-repo/backend:$SHORT_SHA'

  # 4. Fase de Despliegue Continuo (CD): Actualizar Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hwb-backend-dev'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/hwb-repo/backend:$SHORT_SHA'
      - '--region'
      - 'us-central1'

# Opciones adicionales:
# Logging y fallos rápidos
options:
  logging: CLOUD_LOGGING_ONLY

# Timeout de seguridad (Si tarda más de 15 mins, se cancela)
timeout: '900s'