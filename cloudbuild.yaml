steps:
  # ======================================================
  # STEP 1: RUN TESTS
  # ======================================================
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install uv
        uv sync
        export SECRET_KEY="dummy_secret_for_testing_only"
        export DB_PASS="dummy_pass"
        export DATABASE_URL="sqlite:///./test.db"
        export HL7_SENDING_APP="HWB_BACKEND"
        export HL7_SENDING_FACILITY="HWB_FIELD_CLINIC"
        export HL7_RECEIVING_APP="GCP_HEALTHCARE"
        export HL7_RECEIVING_FACILITY="GCP_DATALAKE"
        export HL7_PROCESSING_ID="D"
        export HL7_VERSION_ID="2.5.1"
        uv run pytest

  # ======================================================
  # STEP 2: BUILD THE DOCKER IMAGE
  # ======================================================
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/hwb-repo/hwb-backend:$COMMIT_SHA'
      - '.'

  # ======================================================
  # STEP 3: PUSH THE IMAGE TO THE REGISTRY (CLOUD)
  # ======================================================
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/hwb-repo/hwb-backend:$COMMIT_SHA'

  # ======================================================
  # STEP 4: DEPLOY TO CLOUD RUN
  # ======================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hwb-backend-dev'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/hwb-repo/hwb-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--update-secrets'
      - 'DB_PASS=hwb-db-pass:latest,SECRET_KEY=hwb-secret-key:latest'
      # 1. Montar la conexión de la nueva instancia SQL
      - '--set-cloudsql-instances'
      - 'migrants-unicef:us-central1:hwb-db-cluster'
      # 2. Actualizar las variables de entorno para que config.py las lea
      - '--update-env-vars'
      - 'INSTANCE_CONNECTION_NAME=migrants-unicef:us-central1:hwb-db-cluster,DB_USER=postgres,DB_NAME=hwb_db'

# Maximum build time (15 minutes)
timeout: '900s'

# Use Cloud Logging only to avoid unnecessary logs in Cloud Build
options:
  logging: CLOUD_LOGGING_ONLY